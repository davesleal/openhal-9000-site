      .hero-title { font-size: 24px; }
      .install-buttons { flex-direction: column; align-items: center; }
      .room-wrapper figure { transform: scale(0.5); }
      .vital-row { flex-direction: column; height: auto; }
      .vital-label { width: 100%; height: 28px; }
      .vital-bar { height: 32px; justify-content: center; padding-right: 0; }
    }

    /* ── HEROS screens (verbatim from heros-interface.html) ── */
    :root {
      --font-display: 'Zalando Sans Expanded', 'League Spartan', 'Michroma', system-ui, sans-serif;
      --font-eyebrow: 'Michroma', 'IBM Plex Sans Condensed', sans-serif;
      --font-data: 'IBM Plex Mono', monospace;
      --font-body: 'IBM Plex Sans', sans-serif;
      --font-condensed: 'IBM Plex Sans Condensed', sans-serif;
      --font-label: 'Agdasima', 'IBM Plex Sans', sans-serif;
      --bezel: #222;
      --blue-screen: #0e2d5c;
      --blue-bright: #2266bb;
      --teal-dark: #0a1a1e;
      --mauve: #2a2035;
      --purple-bg: #4a2070;
      --red-screen: #5c1a1a;
      --text-dim: rgba(255,255,255,0.35);
      --text-bright: rgba(255,255,255,0.85);
    }

    .hi-sg {
      display: grid; grid-template-columns: repeat(4, 240px);
      grid-template-rows: repeat(4, 240px); gap: 18px;
    }
    .hi-sg-hero {
      grid-template-columns: repeat(2, 240px);
      grid-template-rows: repeat(2, 240px);
      gap: 56px;
    }
    .hi-bz {
      background: var(--bezel); border-radius: 10px; padding: 7px;
      position: relative; aspect-ratio: 1;
      box-shadow: 3px 3px 14px rgba(0,0,0,0.9), inset -1px -1px 2px rgba(255,255,255,0.015);
    }
    .hi-bz::before {
      content: attr(data-id); position: absolute; top: -14px; left: 0;
      font-family: 'Zalando Sans Expanded', 'League Spartan', sans-serif;
      font-weight: 900; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(200,200,210,0.45); z-index: 5;
    }
    .hi-s {
      width: 100%; height: 100%; border-radius: 3px; position: relative;
      overflow: hidden;
      animation: hiJitter 3.7s ease-in-out infinite;
    }
    .hi-s::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.035) 50%);
      background-size: 100% 3px; pointer-events: none; z-index: 3;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.8), inset 0 0 4px 4px rgba(0,0,0,0.9);
    }
    /* Chromatic aberration overlay — subtle RGB misconvergence */
    .hi-s::before {
      content: ''; position: absolute; inset: 0;
      pointer-events: none; z-index: 4;
      background:
        linear-gradient(90deg, rgba(255,40,60,0.045) 0%, transparent 4%, transparent 96%, rgba(40,180,255,0.045) 100%);
      mix-blend-mode: screen;
    }
    @keyframes hiJitter {
      0%, 100% { transform: translate(0, 0); }
      18% { transform: translate(0.4px, -0.3px); }
      34% { transform: translate(-0.3px, 0.4px); }
      52% { transform: translate(0.5px, 0.2px); }
      71% { transform: translate(-0.4px, -0.3px); }
      86% { transform: translate(0.2px, 0.4px); }
    }
    .hi-svglbl { font-family: 'IBM Plex Mono', monospace; }

    /* ═══ C1 — MULTI-CURVE VECTOR PLOT ═══ */
    .v-c1 .hi-s { background: var(--blue-screen); padding: 12px; display: flex; flex-direction: column; }
    .v-c1 .label-top { font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; font-family: var(--font-data); }
    .v-c1 svg { width: 100%; flex: 1; }
    .v-c1 .grid-l { stroke: rgba(255,255,255,0.06); stroke-width: 0.4; }
    .v-c1 .axis-l { stroke: rgba(200,220,255,0.15); stroke-width: 0.6; }
    .v-c1 .curve {
      fill: none; stroke: rgba(220,230,255,0.7); stroke-width: 0.7;
      stroke-dasharray: 600; stroke-dashoffset: 600; animation: traceIn 6s ease-out infinite;
    }
    .v-c1 .curve:nth-child(n+6) { stroke-width: 0.5; opacity: 0.7; }
    .v-c1 .curve:nth-child(2){animation-delay:.3s} .v-c1 .curve:nth-child(3){animation-delay:.6s}
    .v-c1 .curve:nth-child(4){animation-delay:.9s} .v-c1 .curve:nth-child(5){animation-delay:1.2s}
    .v-c1 .curve:nth-child(6){animation-delay:1.5s} .v-c1 .curve:nth-child(7){animation-delay:1.8s}
    .v-c1 .curve:nth-child(8){animation-delay:2.1s} .v-c1 .curve:nth-child(9){animation-delay:2.4s}
    .v-c1 .curve:nth-child(10){animation-delay:2.7s}
    @keyframes traceIn {
      0% { stroke-dashoffset: 600; opacity: 0; }
      5% { opacity: 0.9; }
      50% { stroke-dashoffset: 0; opacity: 0.9; }
      75% { stroke-dashoffset: 0; opacity: 0.7; }
      90% { stroke-dashoffset: 0; opacity: 0; }
      100% { stroke-dashoffset: 600; opacity: 0; }
    }
    .v-c1 .data-foot { font-size: 7px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; font-family: var(--font-data); }
    .v-c1 svg text { opacity: 0; animation: typeHold 8s steps(5) 1s infinite; font-family: var(--font-data); }

    @keyframes typeHold {
      0% { width: 0; opacity: 1; }
      15% { width: 100%; opacity: 1; }
      82% { width: 100%; opacity: 1; }
      92% { width: 100%; opacity: 0; }
      100% { width: 0; opacity: 0; }
    }
    @keyframes revealBlock {
      0% { max-height: 0; opacity: 0; }
      2% { max-height: 500px; opacity: 1; }
      82% { max-height: 500px; opacity: 1; }
      92% { max-height: 500px; opacity: 0; }
      100% { max-height: 0; opacity: 0; }
    }
    /* Type once and stay — relies on orchestrator to restart on each reveal */
    @keyframes typeIn {
      from { width: 0; }
      to   { width: 100%; }
    }

    /* Multi-line typewriter: each .tw-line animates independently */
    .tw-line {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      width: 0;
    }

    @keyframes crtGlitch {
      0%   { transform: translate(0,0); }
      5%   { transform: translate(-0.5px, 0); }
      6%   { transform: translate(0.7px, 0.3px); }
      7%   { transform: translate(0,0); }
      38%  { transform: translate(0,0); }
      39%  { transform: translate(0.4px, -0.3px); }
      40%  { transform: translate(-0.6px, 0); }
      41%  { transform: translate(0,0); }
      72%  { transform: translate(0,0); }
      73%  { transform: translate(0.5px, 0.2px); }
      74%  { transform: translate(-0.3px, 0); }
      75%  { transform: translate(0,0); }
      100% { transform: translate(0,0); }
    }
    @keyframes crtFlicker {
      0%   { opacity: 1; }
      15%  { opacity: 0.94; }
      16%  { opacity: 0.88; }
      17%  { opacity: 0.97; }
      52%  { opacity: 1; }
      53%  { opacity: 0.9; }
      54%  { opacity: 1; }
      85%  { opacity: 1; }
      86%  { opacity: 0.92; }
      87%  { opacity: 0.98; }
      100% { opacity: 1; }
    }

    .v-c1 .label-top { overflow: hidden; white-space: nowrap; animation: typeHold 8s steps(8) infinite; }
    .v-c1 .data-foot { overflow: hidden; white-space: nowrap; width: 0; animation: typeHold 8s steps(40) 0.8s infinite; }

    .v-c2 .data-head { overflow: hidden; white-space: nowrap; animation: typeHold 12s steps(25) infinite; }
    .v-c2 .hi-s { background: #1a5599; padding: 12px; display: flex; flex-direction: column; font-family: var(--font-data); color: rgba(140,200,255,0.85); }
    .v-c2 .data-head { font-size: 9px; color: rgba(100,180,255,0.5); margin-bottom: 4px; }
    .v-c2 .data-table { flex: 1; font-size: 10px; line-height: 1.4; overflow: hidden; color: rgba(140,210,255,0.82); position: relative; }
    .v-c2 .data-table-inner { position: relative; animation: c2scroll 20s linear infinite; }
    .v-c2 .data-table .row { display: grid; grid-template-columns: 65px 20px 38px 26px 22px; gap: 0 3px; }
    @keyframes c2scroll { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
    .v-c2 .data-foot { overflow: hidden; white-space: nowrap; width: 0; animation: typeHold 12s steps(20) 2s infinite; margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(100,180,255,0.25); font-size: 9px; text-align: center; color: rgba(140,200,255,0.65); }

    .v-c3 .c3-sub { overflow: hidden; white-space: nowrap; animation: typeHold 10s steps(38) infinite; }
    .v-c3 svg text { opacity: 0; animation: typeHold 10s steps(28) 2s infinite; }

    .v-c4 svg text { opacity: 0; animation: typeHold 14s steps(30) 1s infinite; }

    .v-c5 .gh { overflow: hidden; white-space: nowrap; animation: typeHold 12s steps(22) infinite; }
    .v-c5 .data-col { overflow: hidden; white-space: nowrap; width: 0; animation: typeHold 12s steps(18) 0.5s infinite; }
    .v-c5 svg text { opacity: 0; animation: typeHold 12s steps(6) 1.5s infinite; }

    .v-c6 .chk-title { overflow: hidden; white-space: nowrap; width: 0; animation: typeIn 1.2s steps(16) 0s 1 forwards; }
    .v-c6 .chk-data { overflow: hidden; }
    .v-c6 .chk-data .tw-line:nth-child(1) { animation: typeIn 0.7s steps(21) 1.3s 1 forwards; }
    .v-c6 .chk-data .tw-line:nth-child(2) { animation: typeIn 0.8s steps(25) 2.0s 1 forwards; }
    .v-c6 .chk-data .tw-line:nth-child(3) { animation: typeIn 0.6s steps(18) 2.8s 1 forwards; }
    .v-c6 .chk-foot { overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; }
    .v-c6 .chk-foot .tw-line:nth-child(1) { animation: typeIn 0.3s steps(6) 3.6s 1 forwards; }
    .v-c6 .chk-foot .tw-line:nth-child(2) { animation: typeIn 0.4s steps(9) 4.0s 1 forwards; }
    .v-c6 .chk-foot .tw-line:nth-child(3) { animation: typeIn 0.3s steps(6) 4.5s 1 forwards; }
    .v-c6 .chk-foot .tw-line:nth-child(4) { animation: typeIn 0.4s steps(9) 4.9s 1 forwards; }

    .v-c8a .c8-meta { overflow: hidden; }
    .v-c8a .c8-meta .tw-line:nth-child(1) { animation: typeIn 0.5s steps(10) 0.8s 1 forwards; }
    .v-c8a .c8-meta .tw-line:nth-child(2) { animation: typeIn 0.6s steps(14) 1.4s 1 forwards; }
    .v-c8a .c8-meta .tw-line:nth-child(3) { animation: typeIn 0.6s steps(15) 2.1s 1 forwards; }
    .v-c8a .c8-meta .tw-line:nth-child(4) { animation: typeIn 0.5s steps(13) 2.8s 1 forwards; }
    .v-c8b .c8-meta-bl { overflow: hidden; }
    .v-c8b .c8-meta-bl .tw-line:nth-child(1) { animation: typeIn 0.7s steps(24) 0.8s 1 forwards; }
    .v-c8b .c8-meta-bl .tw-line:nth-child(2) { animation: typeIn 0.7s steps(22) 1.5s 1 forwards; }

    /* ═══ C5 — DECAY GRAPH (red) ═══ */
    .v-c5 .hi-s { background: var(--red-screen); padding: 10px; display: flex; flex-direction: column; position: relative; }
    .v-c5 .gh { font-size: 7px; color: rgba(255,200,200,0.4); line-height: 1.3; margin-bottom: 2px; font-family: var(--font-data); }
    .v-c5 svg { flex: 1; width: 100%; }
    .v-c5 .rg { stroke: rgba(255,180,180,0.1); stroke-width: 0.3; }
    .v-c5 .decay-main { fill: none; stroke: rgba(255,220,220,0.7); stroke-width: 1; stroke-dasharray: 600; stroke-dashoffset: 600; animation: decayDraw 10s ease-out infinite; filter: drop-shadow(0 0 3px rgba(255,180,180,0.3)); }
    .v-c5 .decay-trail { fill: none; stroke: rgba(255,200,200,0.3); stroke-width: 0.4; stroke-dasharray: 600; stroke-dashoffset: 600; animation: decayDraw 10s ease-out infinite; }
    .v-c5 .decay-trail:nth-child(5){animation-delay:.4s} .v-c5 .decay-trail:nth-child(6){animation-delay:.8s}
    .v-c5 .decay-trail:nth-child(7){animation-delay:1.2s} .v-c5 .decay-trail:nth-child(8){animation-delay:1.6s}
    .v-c5 .decay-trail:nth-child(9){animation-delay:2s}
    @keyframes decayDraw {
      0% { stroke-dashoffset: 600; opacity: 0; }
      5% { opacity: 0.8; }
      45% { stroke-dashoffset: 0; opacity: 0.8; }
      70% { stroke-dashoffset: 0; opacity: 0.6; }
      88% { stroke-dashoffset: 0; opacity: 0; }
      100% { stroke-dashoffset: 600; opacity: 0; }
    }
    .v-c5 .data-col { position: absolute; right: 12px; top: 36px; font-size: 7px; color: rgba(255,200,200,0.4); line-height: 1.7; text-align: right; font-family: var(--font-data); }
    .v-c5 .data-col .val { color: rgba(140,200,255,0.6); }
    .v-c5 .progress-bars {
      position: absolute; bottom: 10px; right: 10px;
      display: flex; gap: 4px; align-items: flex-end; height: 60px;
    }
    .v-c5 .pbar {
      width: 5px; background: rgba(255,180,180,0.15);
      border: 1px solid rgba(255,180,180,0.25);
      position: relative; overflow: hidden;
    }
    .v-c5 .pbar-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(255,160,160,0.4);
      box-shadow: 0 0 4px rgba(255,120,120,0.2);
    }
    .v-c5 .pbar:nth-child(1) { height: 55px; }
    .v-c5 .pbar:nth-child(1) .pbar-fill { height: 72%; animation: pbar1 8s ease-in-out infinite; }
    .v-c5 .pbar:nth-child(2) { height: 55px; }
    .v-c5 .pbar:nth-child(2) .pbar-fill { height: 45%; animation: pbar2 10s ease-in-out infinite; }
    .v-c5 .pbar:nth-child(3) { height: 55px; }
    .v-c5 .pbar:nth-child(3) .pbar-fill { height: 88%; animation: pbar3 7s ease-in-out infinite; }
    .v-c5 .pbar:nth-child(4) { height: 55px; }
    .v-c5 .pbar:nth-child(4) .pbar-fill { height: 33%; animation: pbar4 12s ease-in-out infinite; }
    .v-c5 .pbar:nth-child(5) { height: 55px; }
    .v-c5 .pbar:nth-child(5) .pbar-fill { height: 60%; animation: pbar5 9s ease-in-out infinite; }
    @keyframes pbar1 { 0%,100%{height:72%} 30%{height:45%} 60%{height:85%} }
    @keyframes pbar2 { 0%,100%{height:45%} 25%{height:78%} 55%{height:30%} 80%{height:62%} }
    @keyframes pbar3 { 0%,100%{height:88%} 40%{height:55%} 70%{height:92%} }
    @keyframes pbar4 { 0%,100%{height:33%} 20%{height:70%} 50%{height:25%} 75%{height:55%} }
    @keyframes pbar5 { 0%,100%{height:60%} 35%{height:82%} 65%{height:40%} }
    .v-c5 svg text { animation: typeHold 12s steps(6) 1.5s infinite; opacity: 0; }

    /* ═══ C6 — CHK. PROG. 601 (purple) ═══ */
    .v-c6 .hi-s { background: var(--purple-bg); padding: 16px; display: flex; flex-direction: column; }
    .v-c6 .chk-title { font-family: 'Agdasima', system-ui, sans-serif; font-weight: 700; font-size: 18px; filter: blur(0.25px); color: var(--text-bright); letter-spacing: 0.12em; margin-bottom: 14px; }
    .v-c6 .chk-data { font-family: var(--font-data); font-size: 8px; color: rgba(200,180,255,0.55); line-height: 1.6; flex: 1; }
    .v-c6 .chk-foot { margin-top: auto; font-size: 8px; color: rgba(180,160,240,0.45); display: grid; grid-template-columns: 50px 1fr; gap: 2px 6px; font-family: var(--font-data); }

    /* ═══ C3 — HISTOGRAM (mauve) ═══ */
    .v-c3 .hi-s { background: var(--mauve); position: relative; }
    .v-c3 svg { width: 100%; height: 100%; }
    .v-c3 .hgrid { stroke: rgba(200,190,220,0.08); stroke-width: 0.3; }
    .v-c3 .vgrid { stroke: rgba(200,190,220,0.06); stroke-width: 0.3; }
    .v-c3 .bar {
      fill: rgba(220,210,240,0.25); stroke: none;
    }
    .v-c3 .c3-sub {
      position: absolute; top: 8px; left: 10px;
      font-size: 7px; color: rgba(200,190,220,0.5);
      font-family: var(--font-data); letter-spacing: 0.06em;
      animation: typeHold 10s steps(38) infinite;
    }

    /* ═══ C4 — TARGETING RETICLE ═══ */
    .v-c4 .hi-s { background: #020204; }
    .v-c4 svg { width: 100%; height: 100%; animation: crtGlitch 4s steps(1) infinite, crtFlicker 3.5s steps(1) infinite; }
    .v-c4 .t-ring { fill: none; stroke: rgba(200,160,120,0.4); stroke-width: 0.8; }
    .v-c4 .t-ring-sm { fill: none; stroke: rgba(200,160,120,0.5); stroke-width: 0.8; }
    .v-c4 .t-solid { stroke: rgba(200,170,120,0.5); stroke-width: 0.7; }
    .v-c4 .t-dashed { stroke: rgba(200,170,120,0.35); stroke-width: 0.6; stroke-dasharray: 18 6; }
    .v-c4 .t-cross { stroke: rgba(255,255,255,0.75); stroke-width: 1.2; }
    .v-c4 .t-center { fill: none; stroke: rgba(200,160,120,0.5); stroke-width: 0.8; }
    .v-c4 .xhair-group {
      transform-origin: 100px 100px;
      animation: xhairMain 4s steps(3, end) infinite;
    }
    .v-c4 .xhair-echo { transform-origin: 100px 100px; }
    .v-c4 .xhair-echo-1 { opacity: 0.25; animation: xhairE1 4s steps(3, end) infinite; }
    .v-c4 .xhair-echo-2 { opacity: 0.12; animation: xhairE2 4s steps(3, end) infinite; }
    .v-c4 .xhair-echo-3 { opacity: 0.05; animation: xhairE3 4s steps(3, end) infinite; }
    .v-c4 .echo-cross { stroke: rgba(255,255,255,0.4); stroke-width: 1; }
    .v-c4 .echo-center { fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 0.6; }
    .v-c4 svg text { animation: typeHold 14s steps(30) 1s infinite; opacity: 0; }

    @keyframes xhairMain {
      0%   { transform: rotate(0deg); }
      10%  { transform: rotate(5deg); }
      20%  { transform: rotate(-2deg); }
      30%  { transform: rotate(3deg); }
      40%  { transform: rotate(-6deg); }
      50%  { transform: rotate(1deg); }
      60%  { transform: rotate(-4deg); }
      70%  { transform: rotate(7deg); }
      80%  { transform: rotate(-3deg); }
      90%  { transform: rotate(4deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes xhairE1 {
      0%   { transform: rotate(4deg); }
      10%  { transform: rotate(0deg); }
      20%  { transform: rotate(5deg); }
      30%  { transform: rotate(-2deg); }
      40%  { transform: rotate(3deg); }
      50%  { transform: rotate(-6deg); }
      60%  { transform: rotate(1deg); }
      70%  { transform: rotate(-4deg); }
      80%  { transform: rotate(7deg); }
      90%  { transform: rotate(-3deg); }
      100% { transform: rotate(4deg); }
    }
    @keyframes xhairE2 {
      0%   { transform: rotate(-3deg); }
      10%  { transform: rotate(4deg); }
      20%  { transform: rotate(0deg); }
      30%  { transform: rotate(5deg); }
      40%  { transform: rotate(-2deg); }
      50%  { transform: rotate(3deg); }
      60%  { transform: rotate(-6deg); }
      70%  { transform: rotate(1deg); }
      80%  { transform: rotate(-4deg); }
      90%  { transform: rotate(7deg); }
      100% { transform: rotate(-3deg); }
    }
    @keyframes xhairE3 {
      0%   { transform: rotate(7deg); }
      10%  { transform: rotate(-3deg); }
      20%  { transform: rotate(4deg); }
      30%  { transform: rotate(0deg); }
      40%  { transform: rotate(5deg); }
      50%  { transform: rotate(-2deg); }
      60%  { transform: rotate(3deg); }
      70%  { transform: rotate(-6deg); }
      80%  { transform: rotate(1deg); }
      90%  { transform: rotate(-4deg); }
      100% { transform: rotate(7deg); }
    }

    /* ═══ C7 — CELESTIAL NAV ═══ */
    .v-c7 .hi-s { background: #060b1c; position: relative; overflow: hidden; }
    .v-c7 .c7v { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: opacity 1.5s ease-in-out; }
    .v-c7 .c7v.c7hidden { opacity: 0; pointer-events: none; }
    .v-c7 .c7bg { fill: #060b1c; }
    .v-c7 .c7gc, .v-c7 .c7gl {
      fill: none; stroke: #243882; stroke-width: 1.5;
      stroke-dasharray: 2000; stroke-dashoffset: 2000;
      animation: c7draw 2s cubic-bezier(0.25,1,0.5,1) forwards;
    }
    .v-c7 .c7gc { animation-delay: 0s; }
    .v-c7 .c7gl { animation-delay: 0.5s; }
    .v-c7 .c7tm { fill: rgba(180,200,240,0.7); font-family: 'League Spartan', 'IBM Plex Mono', sans-serif; font-weight: 900; font-size: 28px; }
    .v-c7 .c7ts { fill: rgba(180,200,240,0.5); font-family: 'League Spartan', 'IBM Plex Mono', sans-serif; font-size: 14px; font-weight: 900; }
    .v-c7 .c7tl { fill: #5a6b9c; font-family: var(--font-data); font-weight: 800; font-size: 8px; letter-spacing: 2.5px; }
    .v-c7 .c7db { fill: #eef2ff; }
    .v-c7 .c7df { fill: #5a6b9c; opacity: 0.6; }
    .v-c7 .c7fi { opacity: 0; animation: c7rev 0.8s ease-out forwards; }
    .v-c7 .c7d1 { animation-delay: 2.2s; }
    .v-c7 .c7d2 { animation-delay: 2.6s; }
    .v-c7 .c7d3 { animation-delay: 3.0s; }
    .v-c7 .c7cl { fill: none; stroke: #c1d1f0; stroke-width: 1.5; stroke-dasharray: 500; stroke-dashoffset: 500; opacity: 0.9; animation: c7draw 1.5s ease-in-out 3.8s forwards; }
    .v-c7 .c7nh { fill: #a5bdfc; font-family: var(--font-data); font-weight: bold; font-size: 12px; letter-spacing: 1px; }
    .v-c7 .c7ng { fill: none; stroke: #243673; stroke-width: 1; }
    .v-c7 .c7cd { fill: none; stroke: #6782c5; stroke-width: 1; stroke-dasharray: 3 3; }
    .v-c7 .c7nl { fill: #a5bdfc; font-family: var(--font-data); font-size: 5.5px; font-weight: bold; }
    .v-c7 .c7scan { transform-origin: 0px 0px; animation: c7radar 4s step-end infinite; }
    .v-c7 .c7sh { fill: rgba(232,168,148,0.45); animation: c7pulse 0.1s infinite alternate; }
    .v-c7 .c7glow { filter: drop-shadow(0 0 6px rgba(165,189,252,0.6)); }
    @keyframes c7draw { to { stroke-dashoffset: 0; } }
    @keyframes c7rev { to { opacity: 1; } }
    @keyframes c7radar {
      0%{transform:rotate(0)} 12.5%{transform:rotate(45deg)} 25%{transform:rotate(90deg)}
      37.5%{transform:rotate(135deg)} 50%{transform:rotate(180deg)} 62.5%{transform:rotate(225deg)}
      75%{transform:rotate(270deg)} 87.5%{transform:rotate(315deg)} 100%{transform:rotate(360deg)}
    }
    @keyframes c7pulse { from{opacity:0.35} to{opacity:0.55} }

    /* ═══ C8 — WIREFRAME SPACECRAFT + EVA POD ═══ */
    .v-c8a .hi-s, .v-c8b .hi-s { background: var(--blue-screen); position: relative; overflow: hidden; }
    .v-c8a svg.schematic, .v-c8b svg.schematic { position: absolute; top: 2%; left: 0%; width: 100%; height: 72%; }
    .v-c8a .wf-stroke, .v-c8b .wf-stroke { fill: none; stroke: rgba(200,220,255,0.55); stroke-width: 0.8; }
    .v-c8a .wf-thin, .v-c8b .wf-thin { fill: none; stroke: rgba(200,220,255,0.25); stroke-width: 0.4; }
    .v-c8a .wf-dot, .v-c8b .wf-dot { fill: rgba(200,220,255,0.5); }
    .v-c8a .wf-trace, .v-c8b .wf-trace { fill: none; stroke: rgba(200,220,255,0.5); stroke-width: 0.6; stroke-dasharray: 400; stroke-dashoffset: 400; animation: traceIn 14s ease-out infinite; }
    .v-c8a .accent-cross, .v-c8b .accent-cross { stroke: rgba(255,80,80,0.2); stroke-width: 0.3; }
    .v-c8b .craft-group { animation: craftSway 25s ease-in-out infinite; transform-origin: center; }
    @keyframes craftSway { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(2deg)} }
    .v-c8a .c8-globe, .v-c8b .c8-globe {
      position: absolute; bottom: 2px; right: 2px; width: 28%; height: 28%;
      transition: opacity 0.4s;
      perspective: 150px;
      display: flex; align-items: center; justify-content: center;
    }
    .v-c8a .c8-orb, .v-c8b .c8-orb {
      width: 85%; height: 85%; position: relative;
      transform-style: preserve-3d;
    }
    .v-c8a .c8-orb *, .v-c8a .c8-orb *::before, .v-c8b .c8-orb *, .v-c8b .c8-orb *::before { transform-style: preserve-3d; }
    .v-c8a .c8-ring, .v-c8b .c8-ring {
      position: absolute; inset: 0;
      border: 1px solid rgba(120,180,255,0.25);
      border-radius: 50%;
    }
    .v-c8a .c8-ring:nth-child(1), .v-c8b .c8-ring:nth-child(1) { animation: c8r1 8s linear infinite; }
    .v-c8a .c8-ring:nth-child(2), .v-c8b .c8-ring:nth-child(2) { animation: c8r2 10s linear infinite; border-color: rgba(120,180,255,0.35); }
    .v-c8a .c8-ring:nth-child(3), .v-c8b .c8-ring:nth-child(3) { animation: c8r3 12s linear infinite; }
    .v-c8a .c8-ring:nth-child(4), .v-c8b .c8-ring:nth-child(4) { animation: c8r4 14s linear infinite; border-color: rgba(120,180,255,0.2); }
    .v-c8a .c8-ring:nth-child(5), .v-c8b .c8-ring:nth-child(5) { animation: c8r5 9s linear infinite; border-color: rgba(120,180,255,0.3); }
    .v-c8a .c8-orb-center, .v-c8b .c8-orb-center {
      position: absolute; left: 50%; top: 50%;
      width: 4px; height: 4px; margin: -2px 0 0 -2px;
      background: rgba(120,180,255,0.5);
      border-radius: 50%;
    }
    @keyframes c8r1 { from { transform: rotateX(70deg) rotateY(0deg); } to { transform: rotateX(70deg) rotateY(360deg); } }
    @keyframes c8r2 { from { transform: rotateX(20deg) rotateZ(30deg) rotateY(0deg); } to { transform: rotateX(20deg) rotateZ(30deg) rotateY(360deg); } }
    @keyframes c8r3 { from { transform: rotateX(50deg) rotateZ(-40deg) rotateY(0deg); } to { transform: rotateX(50deg) rotateZ(-40deg) rotateY(360deg); } }
    @keyframes c8r4 { from { transform: rotateX(85deg) rotateZ(60deg) rotateY(0deg); } to { transform: rotateX(85deg) rotateZ(60deg) rotateY(360deg); } }
    @keyframes c8r5 { from { transform: rotateX(35deg) rotateZ(-15deg) rotateY(0deg); } to { transform: rotateX(35deg) rotateZ(-15deg) rotateY(360deg); } }
    .v-c8a .c8-meta {
      position: absolute; bottom: 10px; left: 10px;
      font-size: 7px; color: rgba(140,200,255,0.45);
      font-family: var(--font-data); line-height: 1.6; transition: opacity 0.4s;
    }
    .v-c8b .c8-meta-bl {
      position: absolute; top: 64%; left: 10px;
      font-size: 6.5px; color: rgba(140,200,255,0.35);
      font-family: var(--font-data); line-height: 1.4; transition: opacity 0.4s;
    }
    .v-c8a .c8-view, .v-c8b .c8-view { transition: opacity 0.5s; }
    .v-c8a #c8-pod { top: 3%; left: 5%; width: 90%; height: 94%; }
    .v-c8a #c8-pod.flickering { animation: c8flicker 0.12s steps(1) infinite, c8glitch 3s steps(1) infinite; }
    @keyframes c8flicker {
      0% { opacity: 0.85; }
      15% { opacity: 0.95; }
      30% { opacity: 0.7; }
      45% { opacity: 1; }
      55% { opacity: 0.8; }
      70% { opacity: 0.95; }
      85% { opacity: 0.75; }
      100% { opacity: 0.9; }
    }
    @keyframes c8glitch {
      0%  { transform: translate(0,0); }
      7%  { transform: translate(-0.5px, 0); }
      8%  { transform: translate(0.8px, 0.3px); }
      9%  { transform: translate(0, 0); }
      42% { transform: translate(0, 0); }
      43% { transform: translate(0.4px, -0.3px); }
      44% { transform: translate(-0.7px, 0); }
      45% { transform: translate(0, 0); }
      78% { transform: translate(0, 0); }
      79% { transform: translate(0.5px, 0.2px); }
      80% { transform: translate(-0.4px, 0); }
      81% { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    .v-c8b #c8-discovery { animation: crtGlitch 5s steps(1) infinite; }

    /* ═══ C9 — COM STATUS (purple, Eurostile stutter) ═══ */
    .v-c9 .hi-s {
      background: linear-gradient(to bottom, rgba(107,58,125,1) 0%, rgba(85,48,96,1) 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .v-c9 .com-inner {
      text-align: left; color: #fff;
      width: 75%; position: relative;
    }
    .v-c9 .com-pmt {
      font-family: var(--font-data); font-weight: 900; font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6); margin-bottom: 6px;
      overflow: hidden; white-space: nowrap; animation: typeHold 8s steps(12) infinite;
    }
    .v-c9 .com-big {
      font-family: var(--font-display); font-weight: 900; font-size: 48px;
      filter: blur(0.25px); letter-spacing: 0.12em;
      color: #fff; line-height: 1;
      animation: comCycle 8s ease-in-out infinite;
    }
    @keyframes comCycle {
      0% { opacity: 0; }
      4% { opacity: 1; }
      6% { opacity: 0; }
      8% { opacity: 1; }
      10% { opacity: 0.7; }
      12% { opacity: 1; }
      75% { opacity: 1; }
      90% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* ═══ C10 — ORBITAL TRACKER I/MG3 ═══ */
    .v-c10 .hi-s {
      background: radial-gradient(circle at center, #3568e6 0%, #1a3aa8 100%);
      position: relative; overflow: hidden;
    }
    .v-c10 svg { width: 100%; height: 100%; filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.5)); animation: crtGlitch 5s steps(1) infinite, crtFlicker 4s steps(1) infinite; }
    .v-c10 .line-axis { stroke: #ffffff; stroke-width: 1; opacity: 0.7; }
    .v-c10 .line-orbit {
      fill: none; stroke: #ffffff; stroke-width: 1.2; opacity: 0.55;
      stroke-dasharray: 100; stroke-dashoffset: 100;
      animation: c10drawOrbit 2.5s ease-out forwards;
    }
    @keyframes c10drawOrbit { to { stroke-dashoffset: 0; } }
    .v-c10 .text-label { fill: #ffffff; font-family: var(--font-data); font-size: 11px; font-weight: bold; letter-spacing: 1px; }
    .v-c10 .text-title { fill: #ffffff; font-family: var(--font-display); font-size: 32px; font-weight: 900; font-style: normal; letter-spacing: 3px; }
    .v-c10 .tracker-node { fill: #ffffff; filter: drop-shadow(0 0 5px #fff); }
    .v-c10 .loading-type { animation: c10hideLoad 4s ease-in-out forwards; }
    .v-c10 .blinking-load { animation: c10blink 0.8s infinite alternate, c10hideLoad 4s ease-in-out forwards; }
    @keyframes c10hideLoad { 0%,70%{opacity:1;visibility:visible} 100%{opacity:0;visibility:hidden} }
    @keyframes c10blink { from{opacity:1} to{opacity:0.3} }

    /* ═══ C11 — HEROS TERMINAL (blue/cyan CRT) ═══ */
    .v-c11 .hi-s {
      background: #0c0e14; padding: 8px 8px 6px;
      font-family: var(--font-data); font-size: 7.5px;
      color: rgba(140,180,220,0.85); overflow: hidden;
      display: flex; flex-direction: column;
      text-shadow: 0 0 3px rgba(100,160,220,0.2);
    }
    .v-c11-terminal { flex: 1; overflow: hidden; }
    .v-c11 .term-line { white-space: pre; min-height: 1.1em; line-height: 1.4; color: rgba(140,180,220,0.6); font-family: var(--font-data); font-size: 9px; font-weight: 400; text-shadow: 0 0 3px rgba(100,160,220,0.2); letter-spacing: normal; filter: none; }
    .v-c11 .term-line.head { font-size: 8.5px; color: rgba(140,180,220,0.7); margin-bottom: 1px; }
    .v-c11 .hi-s::before {
      content: ''; position: absolute; left: 0; right: 0;
      height: 3px; background: linear-gradient(to bottom, transparent, rgba(100,160,220,0.03), transparent);
      z-index: 2; pointer-events: none;
      animation: termScan 6s linear infinite;
    }
    @keyframes termScan { from{top:-5px} to{top:100%} }

    /* ═══ C12 — SVG WORMHOLE (generated) ═══ */
    .v-c12 .hi-s { background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .v-c12 #wormhole-svg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .v-c12 svg { width: 100%; height: 100%; border-radius: 7px; }
    .v-c12 polygon { fill: black; }

    /* ═══ C13 — WIREFRAME GLOBE (large, centered) ═══ */
    .v-c13 .hi-s { background: #060a12; position: relative; }
    .v-c13 .c13-meta {
      position: absolute; bottom: 8px; left: 10px; right: 10px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px;
      font-size: 6px; color: rgba(140,200,255,0.4);
      font-family: var(--font-data); line-height: 1.6;
      z-index: 2;
    }
    .v-c13 .c13-meta .col { overflow: hidden; white-space: nowrap; animation: typeHold 14s steps(25) infinite; width: 0; }
    .v-c13 .c13-meta .col:nth-child(2) { animation-delay: 0.5s; }
    .v-c13 .c13-label {
      position: absolute; top: 8px; left: 10px;
      font-size: 7px; color: rgba(140,200,255,0.35);
      font-family: var(--font-data); letter-spacing: 0.05em;
      overflow: hidden; white-space: nowrap; animation: typeHold 14s steps(18) infinite;
      z-index: 2;
    }

    /* ═══ C14 — STATUS INDICATORS ═══ */
    .v-c14 .hi-s { background: #0a1418; padding: 10px; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .v-c14 .s14-title {
      font-family: var(--font-display); font-weight: 900; font-size: 11px;
      filter: blur(0.25px); color: rgba(200,230,255,0.75); letter-spacing: 0.1em;
      overflow: hidden; white-space: nowrap; width: 0; animation: typeIn 0.8s steps(10) 0s 1 forwards;
    }
    .v-c14 .ind-row { display: flex; gap: 4px; }
    .v-c14 .ind {
      width: 28px; height: 24px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-data); font-size: 6px; font-weight: bold;
      color: rgba(0,0,0,0.7); letter-spacing: 0.03em;
    }
    .v-c14 .ind-g { background: rgba(80,200,120,0.5); animation: indPulse 3s ease-in-out infinite; }
    .v-c14 .ind-b { background: rgba(80,140,220,0.5); animation: indPulse 3.5s ease-in-out 0.5s infinite; }
    .v-c14 .ind-y { background: rgba(220,200,60,0.5); animation: indPulse 4s ease-in-out 1s infinite; }
    .v-c14 .ind-r { background: rgba(220,80,80,0.4); animation: indPulse 2.5s ease-in-out 0.3s infinite; }
    .v-c14 .ind-m { background: rgba(200,50,122,0.55); animation: indPulse 3.2s ease-in-out 0.7s infinite; }
    @keyframes indPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
    .v-c14 .s14-readout {
      font-family: var(--font-data); font-size: 6.5px;
      color: rgba(140,200,255,0.5); line-height: 1.5; flex: 1;
      overflow: hidden;
    }
    .v-c14 .s14-readout.typing { overflow: hidden; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(1) { animation: typeIn 0.7s steps(22) 1.0s 1 forwards; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(2) { animation: typeIn 0.8s steps(25) 1.8s 1 forwards; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(3) { animation: typeIn 0.7s steps(21) 2.7s 1 forwards; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(4) { animation: typeIn 0.9s steps(29) 3.5s 1 forwards; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(5) { animation: typeIn 0.7s steps(21) 4.5s 1 forwards; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(6) { animation: typeIn 0.6s steps(19) 5.3s 1 forwards; }
    .v-c14 .s14-readout.typing .tw-line:nth-child(7) { animation: typeIn 0.8s steps(25) 6.0s 1 forwards; }
    .v-c14 .s14-foot {
      font-family: var(--font-data); font-size: 5.5px;
      color: rgba(140,200,255,0.3);
      overflow: hidden; white-space: nowrap; width: 0; animation: typeHold 16s steps(30) 2s infinite;
    }

    /* ═══ C15 — SIGNAL WAVEFORM ═══ */
    .v-c15 .hi-s { background: #0c1a10; position: relative; overflow: hidden; }
    .v-c15 canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 7px; }
    .v-c15 .c15-label {
      position: absolute; top: 8px; left: 10px; z-index: 2;
      font-family: var(--font-data); font-size: 7px;
      color: rgba(100,220,120,0.45); letter-spacing: 0.05em;
      overflow: hidden; white-space: nowrap; animation: typeHold 12s steps(18) infinite;
    }
    .v-c15 .c15-data {
      position: absolute; bottom: 8px; right: 10px; z-index: 2;
      font-family: var(--font-data); font-size: 6px; text-align: right;
      color: rgba(100,220,120,0.35); line-height: 1.5;
      overflow: hidden;
    }
    .v-c15 .c15-data .tw-line:nth-child(1) { animation: typeHold 12s steps(16) 1.0s infinite; }
    .v-c15 .c15-data .tw-line:nth-child(2) { animation: typeHold 12s steps(13) 1.6s infinite; }
    .v-c15 .c15-data .tw-line:nth-child(3) { animation: typeHold 12s steps(18) 2.2s infinite; }

    /* ═══ Cell rotation pool ═══ */
    .hi-cell-pool {
      position: absolute; left: -99999px; top: -99999px;
      width: 240px; visibility: hidden;
    }
    .hi-cell-pool .hi-view { display: block; margin-bottom: 18px; }
    .hi-cell-pool .hi-view,
    .hi-cell-pool .hi-view * { animation-play-state: paused !important; }
    .hi-view { width: 100%; height: 100%; display: block; }
    .hi-view.paused,
    .hi-view.paused * { animation-play-state: paused !important; }
    .hi-slot > .hi-view { width: 100%; height: 100%; }

    /* ═══ New Tile Styles (v-hib, v-gde, v-veh, v-nuc, v-dmg, v-cnt) ═══ */
    .tile-solid {
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .tile-inner {
      text-align: left; color: #fff;
      width: 75%; position: relative;
    }
    .tile-pmt {
      font-family: var(--font-data); font-weight: 900; font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6); margin-bottom: 6px;
      overflow: hidden; white-space: nowrap;
      animation: typeHold 8s steps(12) infinite;
    }
    .tile-big {
      font-family: var(--font-display); font-weight: 900; font-size: 48px;
      filter: blur(0.25px); letter-spacing: 0.12em;
      color: #fff; line-height: 1;
      animation: comCycle 8s ease-in-out infinite;
    }
    /* Tile background colors */
    .v-hib .hi-s { background: #1c8a8a; }
    .v-gde .hi-s { background: #2a72c8; }
    .v-veh .hi-s { background: #2aa3d6; }
    .v-nuc .hi-s { background: #1a2c5e; }
    .v-dmg .hi-s { background: #c8323a; }
    .v-cnt .hi-s { background: #2a9d6b; }
    .v-flx .hi-s { background: #3a8fd8; }

    /* ═══ Extra hero views (v-bell, v-prism, v-rem, v-expd, v-defi, v-cba) ═══ */
    .v-bell {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a1540 0%, #3d1e56 50%, #2a1540 100%);
      overflow: hidden;
    }

    .v-bell svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .v-bell-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(90deg, rgba(200,150,220,0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(200,150,220,0.08) 1px, transparent 1px);
      background-size: 12px 12px;
      opacity: 0.6;
      animation: v-bell-grid-fade 2000ms ease-out forwards;
    }

    .v-bell-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .v-bell-curve {
      animation: v-bell-curve-draw 3000ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    .v-bell-curve:nth-child(1) { animation-delay: 200ms; }
    .v-bell-curve:nth-child(2) { animation-delay: 300ms; }
    .v-bell-curve:nth-child(3) { animation-delay: 400ms; }
    .v-bell-curve:nth-child(4) { animation-delay: 500ms; }
    .v-bell-curve:nth-child(5) { animation-delay: 600ms; }
    .v-bell-curve:nth-child(6) { animation-delay: 700ms; }
    .v-bell-curve:nth-child(7) { animation-delay: 800ms; }
    .v-bell-curve:nth-child(8) { animation-delay: 900ms; }

    .v-bell-point {
      animation: v-bell-point-pop 600ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    .v-bell-point:nth-child(9) { animation-delay: 1800ms; }
    .v-bell-point:nth-child(10) { animation-delay: 2000ms; }
    .v-bell-point:nth-child(11) { animation-delay: 2200ms; }

    .v-bell-axis-labels {
      position: absolute;
      left: 3px;
      top: 8px;
      width: 28px;
      height: 100%;
      font-family: var(--font-data, 'Courier New', monospace);
      font-size: 6px;
      color: rgba(200, 150, 220, 0.7);
      line-height: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      animation: v-bell-labels-fade 2000ms ease-out forwards;
      opacity: 0;
    }

    .v-bell-label {
      letter-spacing: -0.5px;
      text-align: right;
      white-space: nowrap;
    }

    .v-bell-readout {
      position: absolute;
      bottom: 2px;
      left: 0;
      right: 0;
      height: 18px;
      background: rgba(30, 10, 50, 0.8);
      border-top: 1px solid rgba(200, 150, 220, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
      font-family: var(--font-data, 'Courier New', monospace);
      font-size: 6px;
      color: rgba(200, 150, 220, 0.8);
      letter-spacing: 0.5px;
      animation: v-bell-readout-fade 2500ms ease-out forwards;
      opacity: 0;
    }

    .v-bell-readout-item {
      display: flex;
      flex-direction: column;
      align-items: center;

@property --hole {
  syntax: '<length>';
  inherits: false;
  initial-value: 25vmin;
}

/* ── SCROLL-DRIVEN ZOOM (CodePen technique) ── */
body { background: #000; overflow-x: hidden; }

.hero-tunnel {
  position: relative;
  height: 200vh;
  overflow: hidden;
}

/* White panel — the "starship" layer that zooms past */
.hero-tunnel .panel {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  /* .panel layers (inside → out):
     - ROOM MASK: the transparent center (var(--hole)) — shows room behind
     - TUNNEL RING: the grey gradient band around the room mask
     - WHITE PANEL: the solid #e8e6e2 fill beyond the ring */
  background:
    radial-gradient(circle at 50% 50%,
      transparent calc(var(--hole) - 2.5vmin),
      #0a0a0a calc(var(--hole) - 2.5vmin),
      #111 calc(var(--hole) - 0.5vmin),
      rgba(160,160,160,0.9) calc(var(--hole) - 0.5vmin),
      rgba(180,180,180,0.8) var(--hole),
      #ccc var(--hole),
      #d5d3cf calc(var(--hole) + 1vmin),
      #ddd calc(var(--hole) + 2vmin),
      #e8e6e2 calc(var(--hole) + 3vmin),
      #e8e6e2 100%);
  --hole: 18vmin;
  animation: panelUpscale linear forwards;
  animation-timeline: scroll(root);
  animation-range: 0vh 100vh;
  pointer-events: none;
}
/* Vignette over the white panel view */
.hero-tunnel .panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.1) 55%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
}

/* The room scene — sits behind the panel, unblurs as you scroll */
.hero-tunnel .room-scene {
  width: 100%;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  z-index: 10;
  pointer-events: none;
}

/* Force the room to render in this context */
.hero-tunnel .room-scene .lmc-room-stage {
  opacity: 1 !important;
  pointer-events: auto;
  position: absolute !important;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
  transform: none !important;
  z-index: 1;
  background: #1c0001;
}
.hero-tunnel .room-scene .lmc-room-stage .room-wrapper {
  opacity: 1 !important;
  pointer-events: none;
}
.hero-tunnel .room-scene .lmc-room-stage .ceiling-hint {
  position: fixed !important;
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%) !important;
  z-index: 30 !important;
  font-size: 14px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  text-shadow: 0 0 12px rgba(255,100,80,0.4);
  transition: none !important;
  animation: hintReveal linear both !important;
  animation-timeline: scroll(root) !important;
  animation-range: 85vh 100vh !important;
}
@keyframes hintReveal {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* Mask room to porthole circle — radial gradient for soft feathered edge */
.hero-tunnel .room-scene {
  -webkit-mask: radial-gradient(circle at 50% 50%, black 22vmin, transparent 25vmin);
  mask: radial-gradient(circle at 50% 50%, black 22vmin, transparent 25vmin);
  animation: roomMask linear forwards;
  animation-timeline: scroll(root);
  animation-range: 0vh 100vh;
}
.hero-tunnel .room-scene .room-wrapper {
  animation: roomReveal linear both !important;
  animation-timeline: scroll(root) !important;
  animation-range: 0vh 100vh !important;
}
@keyframes roomReveal {
  0% { filter: blur(6px); }
  100% { filter: blur(0px); }
}
/* Immersive vignette + radial corner blur — fades in during scroll */
.hero-tunnel .room-scene::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.15) 45%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.85) 90%, black 100%);
  pointer-events: none;
  z-index: 15;
  opacity: 0;
  animation: vignetteIn linear forwards;
  animation-timeline: scroll(root);
  animation-range: 50vh 100vh;
}
@keyframes vignetteIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

/* Corner blur overlay — blurred ring around edges for depth-of-field */
.hero-tunnel .room-scene::before {
  content: "";
  position: fixed;
  inset: -20px;
  background: radial-gradient(ellipse 60% 55% at center, transparent 40%, rgba(0,0,0,0.3) 65%, rgba(0,0,0,0.7) 85%, black 100%);
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
  -webkit-mask: radial-gradient(ellipse at center, transparent 35%, black 70%);
  mask: radial-gradient(ellipse at center, transparent 35%, black 70%);
  pointer-events: none;
  z-index: 16;
  opacity: 0;
  animation: cornerBlurIn linear forwards;
  animation-timeline: scroll(root);
  animation-range: 60vh 100vh;
}
@keyframes cornerBlurIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes roomMask {
  0% {
    -webkit-mask: radial-gradient(circle at 50% 50%, black 22vmin, transparent 25vmin);
    mask: radial-gradient(circle at 50% 50%, black 22vmin, transparent 25vmin);
  }
  10% {
    -webkit-mask: radial-gradient(circle at 50% 50%, black 24vmin, transparent 28vmin);
    mask: radial-gradient(circle at 50% 50%, black 24vmin, transparent 28vmin);
  }
  25% {
    -webkit-mask: radial-gradient(circle at 50% 50%, black 28vmin, transparent 36vmin);
    mask: radial-gradient(circle at 50% 50%, black 28vmin, transparent 36vmin);
  }
  40% {
    -webkit-mask: radial-gradient(circle at 50% 50%, black 36vmin, transparent 50vmin);
    mask: radial-gradient(circle at 50% 50%, black 36vmin, transparent 50vmin);

<script>
// ── Parallax: mousemove rotates room on Y-axis after scroll completes ──
(function() {
  var fig = document.querySelector('.hero-tunnel .room-scene .lmc-room-stage figure');
  if (!fig) return;
  var scrollDone = false;

  window.addEventListener('scroll', function() {
    var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    scrollDone = (window.scrollY / maxScroll) > 0.95;
    if (!scrollDone) {
      fig.style.transform = '';
    }
  });

  window.addEventListener('mousemove', function(e) {
    if (!scrollDone) return;
    var vw = window.innerWidth;
    var nx = (e.clientX - vw / 2) / (vw / 2);
    var ry = nx * 1; // 1deg max — subtle enough to hide wall seams
    fig.style.transform = 'translate(-50%, -50%) rotateY(' + ry + 'deg)';
  });
})();
</script>
