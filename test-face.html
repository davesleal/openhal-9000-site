<!DOCTYPE html>
<html><head><style>
body { background: #0a0a0a; padding: 60px; font-family: system-ui; margin: 0; }
.grid {
  display: flex;
  flex-direction: column;
  gap: 80px;
  align-items: center;
  padding: 40px;
  perspective: 800px;
  perspective-origin: 50% 50%;
}
.row {
  display: flex;
  gap: 80px;
  justify-content: center;
  transform-style: preserve-3d;
}
.slot {
  width: 35px;
  height: 180px;
  background: #0a0a0a;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 1px;
  box-shadow: inset 0 0 18px rgba(255,255,255,0.6);
  box-sizing: border-box;
  position: relative;
  transform-style: preserve-3d;
}
.cuboid {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  cursor: pointer;
  transform: scale3d(1, 1, 1);
  transition: transform 3s cubic-bezier(0.22, 0.85, 0.25, 1);
}
.cuboid.retracted {
  transform: scale3d(1, 1, 0.15);
}
.face-front {
  position: absolute;
  inset: 0;
  background: #eee;
  transform: translateZ(80px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 6px;
  backface-visibility: hidden;
}
.face-back {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  -webkit-backdrop-filter: blur(0.5px);
  backdrop-filter: blur(0.5px);
}
.face-front .num {
  font-weight: 900;
  font-size: 14px;
  color: #1a1a1a;
}
.face-front .lbl {
  font-size: 8px;
  font-weight: 700;
  color: #1a1a1a;
  text-transform: uppercase;
}
.face-right {
  position: absolute;
  top: 0; left: 100%;
  width: 80px; height: 100%;
  background: linear-gradient(to right, rgba(255,255,255,0.18), rgba(255,255,255,0.05));
  -webkit-backdrop-filter: blur(0.5px);
  backdrop-filter: blur(0.5px);
  transform-origin: top left;
  transform: rotateY(-90deg);
}
.face-left {
  position: absolute;
  top: 0; right: 100%;
  width: 80px; height: 100%;
  background: linear-gradient(to left, rgba(255,255,255,0.18), rgba(255,255,255,0.05));
  -webkit-backdrop-filter: blur(0.5px);
  backdrop-filter: blur(0.5px);
  transform-origin: top right;
  transform: rotateY(90deg);
}
.face-top {
  position: absolute;
  bottom: 100%; left: 0;
  width: 100%; height: 80px;
  background: linear-gradient(to top, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
  -webkit-backdrop-filter: blur(0.5px);
  backdrop-filter: blur(0.5px);
  transform-origin: center bottom;
  transform: rotateX(-90deg);
}
.face-bottom {
  position: absolute;
  top: 100%; left: 0;
  width: 100%; height: 80px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
  -webkit-backdrop-filter: blur(0.5px);
  backdrop-filter: blur(0.5px);
  transform-origin: center top;
  transform: rotateX(90deg);
}
.face-right, .face-left, .face-top, .face-bottom {
  outline: 1px solid rgba(255,255,255,0.15);
}
.keyhole {
  width: 8px; height: 8px;
  background: #da251d;
  box-shadow: 0 0 6px #da251d;
  position: absolute;
  bottom: -14px; left: 50%;
  transform: translateX(-50%) translateZ(1px);
  z-index: 10;
}
h2 { color: #666; text-align: center; font-size: 12px; letter-spacing: 0.1em; margin-bottom: 20px; }
</style></head>
<body>
<h2>CLICK TO INSERT</h2>
<div class="grid" id="grid"></div>
<script>
var grid = document.getElementById('grid');
for (var r = 0; r < 3; r++) {
  var row = document.createElement('div');
  row.className = 'row';
  for (var i = 1; i <= 6; i++) {
    var slot = document.createElement('div');
    slot.className = 'slot';

    var keyhole = document.createElement('div');
    keyhole.className = 'keyhole';
    slot.appendChild(keyhole);

    var cuboid = document.createElement('div');
    cuboid.className = 'cuboid';

    var back = document.createElement('div');
    back.className = 'face-back';
    cuboid.appendChild(back);

    var front = document.createElement('div');
    front.className = 'face-front';
    var num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(r * 6 + i);
    front.appendChild(num);
    var lbl = document.createElement('span');
    lbl.className = 'lbl';
    lbl.textContent = 'MT';
    front.appendChild(lbl);
    cuboid.appendChild(front);

    ['face-right','face-left','face-top','face-bottom'].forEach(function(cls) {
      var f = document.createElement('div');
      f.className = cls;
      cuboid.appendChild(f);
    });

    cuboid.addEventListener('click', function() {
      this.classList.toggle('retracted');
    });

    slot.appendChild(cuboid);
    row.appendChild(slot);
  }
  grid.appendChild(row);
}
</script>
</body></html>
